# MergeDNA Pre-training - Local Single GPU (RTX 5070 Ti 16GB)
#
# Full 380M paper architecture, reduced steps for local training.
# Benchmarked: bs=4 accum=4 -> 1.92s/step, 12GB VRAM, 20K steps ≈ 11h
#
# After local pre-training, move to server for full 100K steps with
# larger batch and seq_len=4096.

# Data
data_path: "./data/pretrain/multi_species_genomes"
max_seq_length: 1024  # Paper: 4096, reduced for VRAM (source matrix is N^2)

# Model Architecture (380M parameters - identical to paper)
vocab_size: 10
embed_dim: 1024
num_heads: 16
local_encoder_layers: 4
latent_encoder_layers: 20
latent_decoder_layers: 4
local_decoder_layers: 2
window_size: 16
dropout: 0.0
use_flash_attn: true
gradient_checkpointing: true

# Pre-training Objectives (same as paper)
lambda_latent: 0.25
compression_target: 0.5
compression_variance: 0.1
use_mtr: true
use_latent_mtr: true
use_amtm: true
amtm_masking_strategy: "adaptive"
random_mask_ratio: 0.15

# Training - optimized for single RTX 5070 Ti
max_steps: 100000             # Continue local training to 100K total steps
batch_size: 4                 # Peak VRAM ~12GB
gradient_accumulation: 4      # Effective batch = 16
learning_rate: 1.0e-4
weight_decay: 0.01
warmup_steps: 1000
max_grad_norm: 1.0
use_amp: true

# System
num_workers: 4
log_interval: 50
save_interval: 2000
output_dir: "./outputs/pretrain_local"
