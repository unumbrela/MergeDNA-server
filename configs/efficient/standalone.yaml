# EfficientMergeDNA Standalone Pre-training Config (No Distillation)
# Used as ablation baseline to show distillation's contribution.

# ===== Model config =====
embed_dim: 512
num_heads: 8
local_encoder_layers: 3
latent_encoder_layers: 8
latent_decoder_layers: 2
local_decoder_layers: 1
window_size: 16
max_seq_length: 4096

# Hybrid latent encoder
latent_encoder_type: "hybrid"
ssm_type: "gated_deltanet"
attention_layer_indices: [3, 7]

# Aggressive compression
compression_target: 0.2
compression_variance: 0.05
use_learned_compression: true
r_min_per_window: 2
r_max_per_window: 14
use_entropy_guided_merging: true
entropy_weight: 0.5
entropy_model_hidden_dim: 64
entropy_model_kernel_size: 9
entropy_aux_loss_weight: 0.1
compression_loss_weight: 0.1

# Pre-training objectives
use_mtr: true
use_latent_mtr: true
use_amtm: true
amtm_masking_strategy: "adaptive"
lambda_latent: 0.25
K_ratio: 0.5

# ===== Training =====
data_path: "./data/pretrain/multi_species_genomes"
max_steps: 100000
batch_size: 16
gradient_accumulation: 2
learning_rate: 2.0e-4
weight_decay: 0.01
warmup_steps: 2000
max_grad_norm: 1.0
use_amp: true
gradient_checkpointing: true

# ===== System =====
num_workers: 8
log_interval: 100
save_interval: 5000
output_dir: "./outputs/efficient_standalone"
