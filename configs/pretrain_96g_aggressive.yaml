# MergeDNA Pre-training - 96GB GPU Aggressive Throughput Probe
#
# Use this only after confirming that configs/pretrain_96g.yaml is stable.
# This increases the effective batch beyond the paper setting in exchange
# for higher throughput on 96GB-class GPUs.

# Data
data_path: "./data/pretrain/multi_species_genomes"
max_seq_length: 4096

# Model Architecture
vocab_size: 10
embed_dim: 1024
num_heads: 16
local_encoder_layers: 4
latent_encoder_layers: 20
latent_decoder_layers: 4
local_decoder_layers: 2
window_size: 16
dropout: 0.0
use_flash_attn: true
gradient_checkpointing: true

# Pre-training Objectives
lambda_latent: 0.25
compression_target: 0.5
compression_variance: 0.1
use_mtr: true
use_latent_mtr: true
use_amtm: true
amtm_masking_strategy: "adaptive"
random_mask_ratio: 0.15

# Training
max_steps: 100000
batch_size: 48
gradient_accumulation: 1
learning_rate: 1.0e-4
weight_decay: 0.01
warmup_steps: 2000
max_grad_norm: 1.0
use_amp: true

# System
num_workers: 16
log_interval: 100
save_interval: 2500
output_dir: "./outputs/pretrain_a800_aggressive"
