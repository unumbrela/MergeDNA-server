# MergeDNA Fine-tuning - Full Paper Reproduction (A800 80GB)
#
# LoRA fine-tuning on downstream benchmarks.
# Matches paper: rank=8, alpha=16, lr=5e-5, 10 epochs

# Data
task_name: "human_enhancers_cohn"  # Override per-task
genomic_benchmark_data_dir: "./data/genomic_benchmark_sequences"
nt_benchmark_data_dir: "./data/nt_benchmark"
gue_data_dir: "./data/gue_benchmark/GUE"
lrb_data_dir: "./data/lrb"
spliceai_data_dir: "./data/spliceai"
protein_fitness_data_dir: "./data/protein_fitness"
external_lrb_ref_dir: "./data/external_refs/genomics-long-range-benchmark"
external_spliceai_ref_dir: "./data/external_refs/SpliceAI"
external_proteingym_ref_dir: "./data/external_refs/ProteinGym"
max_seq_length: 4096               # Must match pretrain config
embedding_window_length: 4096
embedding_window_stride: 4096
spliceai_sequence_length: 10000
spliceai_negatives_per_positive: 1
lrb_eqtl_sequence_length: 20000
lrb_bulk_rna_sequence_length: 40000
protein_fitness_assays:
  bacteria: "BLAT_ECOLX_Firnberg_2014"
  human: "BRCA1_HUMAN_Findlay_2018"

# Model (must match pretrain_a800 config)
pretrain_ckpt: "./outputs/pretrain_a800/checkpoint-100000.pt"
vocab_size: 10
embed_dim: 1024
num_heads: 16
local_encoder_layers: 4
latent_encoder_layers: 20
latent_decoder_layers: 4
local_decoder_layers: 2
window_size: 16
use_flash_attn: true
gradient_checkpointing: true

# Fine-tuning (paper settings)
task_type: "sequence_classification"
num_epochs: 10
batch_size: 32
learning_rate: 5.0e-5
weight_decay: 0.01
warmup_ratio: 0.1
max_grad_norm: 1.0
use_amp: true

# LoRA (paper settings)
use_lora: true
lora_rank: 8
lora_alpha: 16

# Output
output_dir: "./outputs/finetune_a800"
